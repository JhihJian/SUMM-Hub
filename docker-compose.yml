services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # 客户端连接
      - "8222:8222"   # HTTP 监控
      - "6222:6222"   # 集群路由
    command: >
      -js
      -sd /data
      -m 8222
    volumes:
      - nats-data:/data
      - ./nats/server.conf:/etc/nats/server.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  feishu-consumer:
    build: ./consumer/feishu-consumer
    environment:
      - NATS_URL=nats://nats:4222
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_RECEIVER_ID=${FEISHU_RECEIVER_ID}
      - FEISHU_RECEIVER_TYPE=${FEISHU_RECEIVER_TYPE:-open_id}
      - E2E_MODE=${E2E_MODE:-false}
    depends_on:
      nats:
        condition: service_healthy

  feishu-e2e:
    build:
      context: ./consumer/feishu-consumer
      dockerfile: Dockerfile.e2e
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
      feishu-consumer:
        condition: service_started
    profiles:
      - test

volumes:
  nats-data:
