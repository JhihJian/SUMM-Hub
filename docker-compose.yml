services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # 客户端连接
      - "8222:8222"   # HTTP 监控
      - "6222:6222"   # 集群路由
    command: >
      -js
      -sd /data
      -m 8222
    volumes:
      - nats-data:/data
      - ./nats/server.conf:/etc/nats/server.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nats-data:
