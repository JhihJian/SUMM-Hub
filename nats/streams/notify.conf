# Notify Domain Stream Configuration
# 用于 SUMM-Hub 通知消息处理

# ============================================================
# NOTIFY_EVENT Stream - 通知事件
# ============================================================
# 创建命令:
# nats stream add NOTIFY_EVENT \
#   --subjects "summ.notify.event" \
#   --retention limits \
#   --max-msgs 50000 \
#   --max-age 3d \
#   --replicas 1 \
#   --storage file

stream: NOTIFY_EVENT
subjects:
  - summ.notify.event
retention: limits
max_msgs: 50000
max_age: 3d
replicas: 1
storage: file

# 消费者定义
consumers:
  notify-consumer:
    durable_name: notify-consumer
    filter_subject: summ.notify.event
    ack_policy: explicit
    max_deliver: 5
    ack_wait: 60s
    deliver_policy: all
