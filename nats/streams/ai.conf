# AI Domain Stream Configuration
# 用于 SUMM-Hub AI 消息处理

# ============================================================
# AI_INPUT Stream - AI 输入消息
# ============================================================
# 创建命令:
# nats stream add AI_INPUT \
#   --subjects "summ.ai.input" \
#   --retention limits \
#   --max-msgs 100000 \
#   --max-age 7d \
#   --replicas 1 \
#   --storage file

stream: AI_INPUT
subjects:
  - summ.ai.input
retention: limits
max_msgs: 100000
max_age: 7d
replicas: 1
storage: file

# 消费者定义
consumers:
  ai-consumer:
    durable_name: ai-consumer
    filter_subject: summ.ai.input
    ack_policy: explicit
    max_deliver: 3
    ack_wait: 30s
    deliver_policy: all

# ============================================================
# AI_OUTPUT Stream - AI 输出消息
# ============================================================
# 创建命令:
# nats stream add AI_OUTPUT \
#   --subjects "summ.ai.output" \
#   --retention limits \
#   --max-msgs 100000 \
#   --max-age 7d \
#   --replicas 1 \
#   --storage file

stream: AI_OUTPUT
subjects:
  - summ.ai.output
retention: limits
max_msgs: 100000
max_age: 7d
replicas: 1
storage: file

