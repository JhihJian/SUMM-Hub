services:
  # Frontend - Vite dev server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - summ-network

  # Backend - Hono API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NATS_URL=nats://summ-hub-nats-1:4222
      - FRONTEND_URL=http://localhost:5173
    networks:
      - summ-network
      - nats_default
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Claude Code Consumer (optional - for full stack)
  claude-consumer:
    build:
      context: ../consumer/claude-code-consumer
      dockerfile: Dockerfile
    environment:
      - NATS_URL=nats://summ-hub-nats-1:4222
      - CONSUMER_ID=0
      - CONSUMER_TOTAL=1
      - ENTITY_TYPE=ai
      - WORKSPACE_DIR=/workspace
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
    volumes:
      - /data/app/Agent/ai-center-agent:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - summ-network
      - nats_default
    profiles:
      - consumer

networks:
  summ-network:
    driver: bridge
  nats_default:
    external: true
